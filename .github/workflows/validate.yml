name: Validate Enhanced Vehicle Squared

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lua 5.1 compiler
        run: sudo apt-get update && sudo apt-get install --yes lua5.1

      - name: Validate and package
        run: scripts/validate.sh

      - name: Validate release tag identity
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch --no-tags origin main
          tag_commit=$(git rev-parse HEAD)
          main_commit=$(git rev-parse origin/main)
          if [[ "$tag_commit" != "$main_commit" ]]; then
            echo "Tag commit $tag_commit is not current origin/main $main_commit" >&2
            exit 1
          fi
          version=$(python3 -c 'import xml.etree.ElementTree as ET; print(ET.parse("modDesc.xml").getroot().findtext("version").strip())')
          expected_tag="v${version}"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match modDesc version $version" >&2
            exit 1
          fi
          notes_file="release-notes/${GITHUB_REF_NAME}.md"
          if [[ ! -f "$notes_file" ]]; then
            echo "Release notes are missing: $notes_file" >&2
            exit 1
          fi

      - name: Upload validated mod archive
        uses: actions/upload-artifact@v4
        with:
          name: FS25_EnhancedVehicleSquared-release
          path: build/FS25_EnhancedVehicle.zip
          if-no-files-found: error

  release:
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/')
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release notes
        uses: actions/checkout@v4

      - name: Download the validated mod archive
        uses: actions/download-artifact@v4
        with:
          name: FS25_EnhancedVehicleSquared-release
          path: build

      - name: Record validated archive identity
        id: archive
        run: |
          cd build
          sha256sum FS25_EnhancedVehicle.zip > FS25_EnhancedVehicle.zip.sha256
          archive_sha256=$(cut -d ' ' -f 1 FS25_EnhancedVehicle.zip.sha256)
          archive_size=$(stat --format='%s' FS25_EnhancedVehicle.zip)
          echo "sha256=$archive_sha256" >> "$GITHUB_OUTPUT"
          echo "size=$archive_size" >> "$GITHUB_OUTPUT"
          echo "### Validated release archive" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA-256: \`$archive_sha256\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Size: $archive_size bytes" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish the validated archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            build/FS25_EnhancedVehicle.zip \
            build/FS25_EnhancedVehicle.zip.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Enhanced Vehicle Squared ${GITHUB_REF_NAME#v}" \
            --notes-file "release-notes/${GITHUB_REF_NAME}.md"
