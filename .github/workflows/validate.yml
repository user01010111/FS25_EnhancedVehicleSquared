name: Validate release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*-community.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lua 5.1 compiler
        run: sudo apt-get update && sudo apt-get install --yes lua5.1

      - name: Validate and package
        run: scripts/validate.sh

      - name: Upload validated mod archive
        uses: actions/upload-artifact@v4
        with:
          name: FS25_EnhancedVehicle
          path: build/FS25_EnhancedVehicle.zip
          if-no-files-found: error

  release:
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      contains(github.ref_name, '-community.')
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download the validated mod archive
        uses: actions/download-artifact@v4
        with:
          name: FS25_EnhancedVehicle
          path: build

      - name: Record validated archive identity
        id: archive
        run: |
          cd build
          sha256sum FS25_EnhancedVehicle.zip > FS25_EnhancedVehicle.zip.sha256
          archive_sha256=$(cut -d ' ' -f 1 FS25_EnhancedVehicle.zip.sha256)
          archive_size=$(stat --format='%s' FS25_EnhancedVehicle.zip)
          echo "sha256=$archive_sha256" >> "$GITHUB_OUTPUT"
          echo "size=$archive_size" >> "$GITHUB_OUTPUT"
          echo "### Validated release archive" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA-256: \`$archive_sha256\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Size: $archive_size bytes" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish the validated archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            build/FS25_EnhancedVehicle.zip \
            build/FS25_EnhancedVehicle.zip.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
