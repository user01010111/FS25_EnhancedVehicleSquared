name: Feature request
description: Propose a focused improvement for Enhanced Vehicle Squared
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Please write the proposal in clear English and explain the player benefit.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note any effect on saves, key bindings, multiplayer, configuration, or other mods.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for the same request.
          required: true
